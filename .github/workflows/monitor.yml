name: Ticket Monitor

on:
  schedule:
    - cron: "*/15 10-23 * * *"
    - cron: "*/15 0-1 * * *"
    - cron: "0 2-9 * * *"
  workflow_dispatch:

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Playwright browser and deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Run monitor
        run: uv run python -m src.main
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

      - name: Commit state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage any changed/untracked files among the observability artifacts.
          git add -N check_log.jsonl 2>/dev/null || true
          if git diff --quiet state.json check_log.jsonl; then
            echo "state and log unchanged, nothing to commit."
            exit 0
          fi
          git add state.json check_log.jsonl
          git commit -m "state: update [skip ci]"
          # Retry with rebase to survive concurrent state commits.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "state push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "state push attempt ${attempt} failed, retrying in $((attempt * 3))s"
            sleep $((attempt * 3))
          done
          echo "state push permanently failed after 5 attempts" >&2
          exit 1
